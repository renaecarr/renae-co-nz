<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>renae.co.nz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0f;
      --mist: #1a1a2e;
      --veil: #12121e;
      --dim: rgba(200, 190, 210, 0.55);
      --glow: rgba(180, 160, 210, 0.15);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* Layered atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(60, 30, 90, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 75% 70%, rgba(20, 10, 50, 0.5) 0%, transparent 65%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0d1a 0%, #05050a 100%);
      z-index: 0;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
      z-index: 1;
      pointer-events: none;
    }

    .scene {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: emerge 3s ease forwards;
      opacity: 0;
    }

    @keyframes emerge {
      0%   { opacity: 0; transform: translateY(12px); }
      40%  { opacity: 0; }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      color: var(--dim);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.6em;
      white-space: nowrap;
    }

    .tagline a {
      display: inline-flex;
      align-items: center;
      gap: 0.55em;
      text-decoration: none;
      color: inherit;
      transition: color 0.6s ease, letter-spacing 0.6s ease;
    }

    .tagline a:hover {
      color: rgba(220, 205, 235, 0.85);
      letter-spacing: 0.12em;
    }

    .arrow {
      display: inline-block;
      font-style: normal;
      font-size: 1.1em;
      opacity: 0.7;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .tagline a:hover .arrow {
      transform: translateX(5px);
      opacity: 1;
    }

    /* Subtle breathing light behind text */
    .halo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 180px;
      background: radial-gradient(ellipse, rgba(120, 80, 180, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Invisible secret link — bottom right */
    .secret {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 113px;   /* ~3cm at 96dpi */
      height: 75px;   /* ~2cm at 96dpi */
      z-index: 10;
      cursor: default;
      display: block;
      text-decoration: none;
      background: transparent;
    }
  </style>
</head>
<body>

  <div class="halo"></div>

  <div class="scene">
    <p class="tagline">
      <a href="thoughts.html">
        Here's what I think
        <span class="arrow">&#8594;</span>
      </a>
    </p>
  </div>

  <!-- Invisible portal, bottom-right corner -->
  <a class="secret" href="thoughts.html" aria-hidden="true" tabindex="-1"></a>

</body>
</html>
